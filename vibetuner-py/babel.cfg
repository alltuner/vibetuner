# Babel extraction config for vibetuner framework strings.
# Extracts translatable strings from the framework's Python source and
# bundled Jinja templates. The resulting catalog ships with the wheel
# under vibetuner/locales/ so apps render framework templates in their
# active locale without needing to re-extract every core string.

[python: src/**.py]

[jinja2: src/vibetuner/templates/**.html.jinja]
input_encoding = utf-8

[jinja2: src/vibetuner/templates/**.txt.jinja]
input_encoding = utf-8

[jinja2: src/vibetuner/templates/**.xml.jinja]
input_encoding = utf-8
