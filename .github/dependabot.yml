# ABOUTME: Dependabot configuration for automated dependency updates.
# ABOUTME: Monitors Python (uv), JavaScript (npm), GitHub Actions, and Docker dependencies.

version: 2
updates:
  # Root Python dependencies (scaffolding dev tools)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "chore(deps)"

  # vibetuner-py Python package
  - package-ecosystem: "uv"
    directory: "/vibetuner-py"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "chore(deps)"

  # vibetuner-template Python dependencies
  - package-ecosystem: "uv"
    directory: "/vibetuner-template"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "chore(deps)"

  # vibetuner-js JavaScript package
  - package-ecosystem: "npm"
    directory: "/vibetuner-js"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "chore(deps)"

  # vibetuner-template JavaScript dependencies
  - package-ecosystem: "npm"
    directory: "/vibetuner-template"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "chore(deps)"

  # Root Dockerfile
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "chore(deps)"

  # Root Compose
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "chore(deps)"

  # vibetuner-template Dockerfile
  - package-ecosystem: "docker"
    directory: "/vibetuner-template"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "chore(deps)"

  # vibetuner-template Compose
  - package-ecosystem: "docker-compose"
    directory: "/vibetuner-template"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "chore(deps)"
