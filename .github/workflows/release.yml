# Releases Python, JavaScript packages and documentation
name: Release vibetuner packages

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      force-python:
        description: "Force publish Python package"
        type: boolean
        default: false
      force-js:
        description: "Force publish JS package"
        type: boolean
        default: false
      force-jinja:
        description: "Force publish Jinja templates package"
        type: boolean
        default: false
      force-docs:
        description: "Force publish documentation"
        type: boolean
        default: false
      version:
        description: "Version to publish (e.g., 1.2.3). Leave empty to use latest release."
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  pages: write

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  # Create releases via Release Please
  create-releases:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create releases
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release PR branch
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        if: steps.release.outputs.prs_created == 'true'
        uses: astral-sh/setup-uv@v8.1.0

      - name: Regenerate uv.lock files on release PR
        if: steps.release.outputs.prs_created == 'true'
        run: |
          uv lock --directory vibetuner-py
          uv lock
          if git diff --quiet uv.lock vibetuner-py/uv.lock; then
            echo "Lock files already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock vibetuner-py/uv.lock
          git commit -m "chore: regenerate uv.lock files"
          git push

  # Determine what needs to be released
  plan-release:
    needs: [create-releases]
    if: |
      always() &&
      ((needs.create-releases.result == 'success' && needs.create-releases.outputs.releases_created == 'true') ||
       github.event_name == 'release' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.plan.outputs.version }}
      python-needed: ${{ steps.plan.outputs.python-needed }}
      js-needed: ${{ steps.plan.outputs.js-needed }}
      jinja-needed: ${{ steps.plan.outputs.jinja-needed }}
      docs-needed: ${{ steps.plan.outputs.docs-needed }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-dependency-glob: |
            vibetuner-py/**/*requirements*.txt
            vibetuner-py/**/*requirements*.in
            vibetuner-py/**/*constraints*.txt
            vibetuner-py/**/*constraints*.in
            vibetuner-py/**/pyproject.toml
            vibetuner-py/**/uv.lock
            vibetuner-py/**/*.py.lock

      - name: Plan release
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get version
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.version }}" ]; then
              VERSION="${{ github.event.inputs.version }}"
              echo "Using manual version: $VERSION"
            else
              VERSION=$(gh release view --json tagName --jq '.tagName' | sed 's/^v//' 2>/dev/null || echo "")
              if [ -n "$VERSION" ]; then
                echo "Using latest GitHub release version: $VERSION"
              else
                echo "❌ No version provided and no GitHub releases found"
                echo "Please provide a version when triggering workflow_dispatch"
                exit 1
              fi
            fi
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "Using release event version: $VERSION"
          else
            VERSION="${{ needs.create-releases.outputs.version }}"
            echo "Using release-please version: $VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_ENV"

          # Determine version type
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.0$ ]] && [[ "$VERSION" != ^1\.0\.0$ ]]; then
            IS_MINOR="true"
            IS_MAJOR="false"
            IS_PATCH="false"
          elif [[ "$VERSION" =~ ^1\.0\.0$ ]]; then
            IS_MAJOR="true"
            IS_MINOR="false"
            IS_PATCH="false"
          else
            IS_MAJOR="false"
            IS_MINOR="false"
            IS_PATCH="true"
          fi

          echo "Version type: major=$IS_MAJOR, minor=$IS_MINOR, patch=$IS_PATCH"

          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "🎉 First release detected"
            BUILD_ALL="true"
          else
            echo "Comparing changes from $PREV_TAG to HEAD"
            BUILD_ALL="false"
          fi

          # For patch versions, check if there are meaningful changes.
          # `grep -c` / `grep -vc` exits non-zero when no lines match, which would
          # crash this `bash -e` step via the `var=$(...)` simple-command rule, so
          # each count pipeline ends with `|| true` to keep the assignment alive.
          if [ "$IS_PATCH" = "true" ] && [ -n "$PREV_TAG" ]; then
            echo "🔍 Checking for meaningful changes in patch version..."

            # Check for changes in all packages (excluding version files)
            PYTHON_CHANGED=$(git diff --name-only "$PREV_TAG..HEAD" | grep -E "^vibetuner-py/" | grep -vcE "pyproject\.toml" || true)
            JS_CHANGED=$(git diff --name-only "$PREV_TAG..HEAD" | grep -E "^vibetuner-js/" | grep -vcE "package\.json" || true)
            JINJA_CHANGED=$(git diff --name-only "$PREV_TAG..HEAD" | grep -E "^vibetuner-jinja/|^vibetuner-py/src/vibetuner/templates/frontend/" | grep -vcE "package\.json" || true)
            TEMPLATE_CHANGED=$(git diff --name-only "$PREV_TAG..HEAD" | grep -E "^vibetuner-template/" | grep -vcE "pyproject\.toml|package\.json" || true)
            DOCS_CHANGED=$(git diff --name-only "$PREV_TAG..HEAD" | grep -cE "^vibetuner-docs/" || true)

            TOTAL_CHANGED=$((PYTHON_CHANGED + JS_CHANGED + JINJA_CHANGED + TEMPLATE_CHANGED + DOCS_CHANGED))

            if [ "$TOTAL_CHANGED" -eq 0 ]; then
              echo "❌ No meaningful changes found in patch version"
              echo "Only version file changes detected - skipping release"
              {
                echo "version="
                echo "python-needed=false"
                echo "js-needed=false"
                echo "jinja-needed=false"
                echo "docs-needed=false"
              } >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "✅ Found meaningful changes in patch version"
              echo "Python: $PYTHON_CHANGED, JS: $JS_CHANGED, Jinja: $JINJA_CHANGED, Template: $TEMPLATE_CHANGED, Docs: $DOCS_CHANGED"
            fi
          fi

          # Check force flags
          FORCE_PYTHON="${{ github.event.inputs.force-python || 'false' }}"
          FORCE_JS="${{ github.event.inputs.force-js || 'false' }}"
          FORCE_JINJA="${{ github.event.inputs.force-jinja || 'false' }}"
          FORCE_DOCS="${{ github.event.inputs.force-docs || 'false' }}"

          echo "🔍 Force flags: python=$FORCE_PYTHON, js=$FORCE_JS, jinja=$FORCE_JINJA, docs=$FORCE_DOCS"

          # Major/minor versions build everything
          if [ "$IS_MAJOR" = "true" ] || [ "$IS_MINOR" = "true" ]; then
            BUILD_ALL="true"
            echo "🚀 Major/minor version - building all packages"
          fi

          # Determine what needs building
          PYTHON_NEEDED="false"
          JS_NEEDED="false"
          JINJA_NEEDED="false"
          DOCS_NEEDED="false"

          # Python
          if [ "$FORCE_PYTHON" = "true" ]; then
            PYTHON_NEEDED="true"
            echo "🔧 Force building Python"
          elif [ "$BUILD_ALL" = "true" ]; then
            PYTHON_NEEDED="true"
            echo "✅ Building Python (major/minor version)"
          elif [ -n "$PREV_TAG" ]; then
            PYTHON_CHANGED=$(git diff --name-only "$PREV_TAG..HEAD" | grep -E "^vibetuner-py/" | grep -vcE "pyproject\.toml" || true)
            if [ "$PYTHON_CHANGED" -gt 0 ]; then
              PYTHON_NEEDED="true"
              echo "✅ Python has changes"
            else
              echo "❌ Python unchanged (only version files)"
            fi
          else
            PYTHON_NEEDED="true"
            echo "✅ Building Python (first release)"
          fi

          # JavaScript
          if [ "$FORCE_JS" = "true" ]; then
            JS_NEEDED="true"
            echo "🔧 Force building JavaScript"
          elif [ "$BUILD_ALL" = "true" ]; then
            JS_NEEDED="true"
            echo "✅ Building JavaScript (major/minor version)"
          elif [ -n "$PREV_TAG" ]; then
            JS_CHANGED=$(git diff --name-only "$PREV_TAG..HEAD" | grep -E "^vibetuner-js/" | grep -vcE "package\.json" || true)
            if [ "$JS_CHANGED" -gt 0 ]; then
              JS_NEEDED="true"
              echo "✅ JavaScript has changes"
            else
              echo "❌ JavaScript unchanged (only version files)"
            fi
          else
            JS_NEEDED="true"
            echo "✅ Building JavaScript (first release)"
          fi

          # Jinja templates package (mirrors vibetuner-py/src/vibetuner/templates/frontend)
          if [ "$FORCE_JINJA" = "true" ]; then
            JINJA_NEEDED="true"
            echo "🔧 Force building Jinja"
          elif [ "$BUILD_ALL" = "true" ]; then
            JINJA_NEEDED="true"
            echo "✅ Building Jinja (major/minor version)"
          elif [ -n "$PREV_TAG" ]; then
            # Trigger on changes to either the package itself or the upstream
            # templates it mirrors, so a Python-side template edit causes the
            # mirror to be republished.
            JINJA_CHANGED=$(git diff --name-only "$PREV_TAG..HEAD" | grep -E "^vibetuner-jinja/|^vibetuner-py/src/vibetuner/templates/frontend/" | grep -vcE "package\.json" || true)
            if [ "$JINJA_CHANGED" -gt 0 ]; then
              JINJA_NEEDED="true"
              echo "✅ Jinja has changes"
            else
              echo "❌ Jinja unchanged (only version files)"
            fi
          else
            JINJA_NEEDED="true"
            echo "✅ Building Jinja (first release)"
          fi

          # vibetuner-js exact-pins vibetuner-jinja to the matching release
          # version (see vibetuner-js/package.json), so any release that
          # publishes js MUST also publish jinja — otherwise the transitive
          # dep resolves to a non-existent registry entry and `bun install`
          # 404s in scaffolded projects.
          if [ "$JS_NEEDED" = "true" ] && [ "$JINJA_NEEDED" != "true" ]; then
            JINJA_NEEDED="true"
            echo "✅ Building Jinja (linked to JS — exact-pin invariant)"
          fi

          # Documentation (build for releases and workflow dispatch)
          if [ "$FORCE_DOCS" = "true" ]; then
            DOCS_NEEDED="true"
            echo "🔧 Force building documentation"
          elif [ "${{ github.event_name }}" = "release" ]; then
            DOCS_NEEDED="true"
            echo "✅ Building documentation (GitHub release)"
          elif [ "${{ github.event_name }}" = "push" ]; then
            DOCS_NEEDED="true"
            echo "✅ Building documentation (release-please release)"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DOCS_NEEDED="true"
            echo "✅ Building documentation (workflow dispatch)"
          else
            DOCS_NEEDED="false"
            echo "❌ Not building documentation"
          fi

          {
            echo "python-needed=$PYTHON_NEEDED"
            echo "js-needed=$JS_NEEDED"
            echo "jinja-needed=$JINJA_NEEDED"
            echo "docs-needed=$DOCS_NEEDED"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Sync versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.plan.outputs.version }}"

          # Validate version is set
          if [ -z "$VERSION" ]; then
            echo "❌ VERSION is not set, cannot sync versions"
            exit 1
          fi

          echo "🔄 Syncing all components to version: $VERSION"

          # Update Python package
          echo "Checking vibetuner-py..."
          cd vibetuner-py
          CURRENT_VERSION=$(uv version --short)
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            echo "Updating vibetuner-py from $CURRENT_VERSION to $VERSION"
            uv version "$VERSION"
          else
            echo "vibetuner-py already at version $VERSION"
          fi
          cd ..

          # Update JS package
          echo "Checking vibetuner-js..."
          cd vibetuner-js
          CURRENT_VERSION=$(bun pm pkg get version | tr -d '"')
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            echo "Updating vibetuner-js from $CURRENT_VERSION to $VERSION"
            bun pm version "$VERSION" --no-git-tag-version
          else
            echo "vibetuner-js already at version $VERSION"
          fi
          cd ..

          # Update Jinja package
          echo "Checking vibetuner-jinja..."
          cd vibetuner-jinja
          CURRENT_VERSION=$(bun pm pkg get version | tr -d '"')
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            echo "Updating vibetuner-jinja from $CURRENT_VERSION to $VERSION"
            bun pm version "$VERSION" --no-git-tag-version
          else
            echo "vibetuner-jinja already at version $VERSION"
          fi
          cd ..

          echo "Updated all components to version $VERSION"

      - name: Upload version files
        uses: actions/upload-artifact@v7
        with:
          name: version-files
          path: |
            vibetuner-py/pyproject.toml
            vibetuner-js/package.json
            vibetuner-jinja/package.json

  # Build Python package
  build-python:
    needs: [create-releases, plan-release]
    if: |
      always() &&
      ((needs.create-releases.result == 'success' && needs.create-releases.outputs.releases_created == 'true') ||
       github.event_name == 'release' ||
       github.event_name == 'workflow_dispatch') &&
      needs.plan-release.outputs.python-needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      success: ${{ steps.build.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download version files
        uses: actions/download-artifact@v8
        with:
          name: version-files
          path: ./

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-dependency-glob: |
            vibetuner-py/**/*requirements*.txt
            vibetuner-py/**/*requirements*.in
            vibetuner-py/**/*constraints*.txt
            vibetuner-py/**/*constraints*.in
            vibetuner-py/**/pyproject.toml
            vibetuner-py/**/uv.lock
            vibetuner-py/**/*.py.lock

      - name: Build package
        id: build
        working-directory: vibetuner-py
        run: |
          uv build
          echo "Build completed successfully"

      - name: Verify package
        working-directory: vibetuner-py
        run: uv publish --dry-run

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: vibetuner-py/dist/

  # Build JavaScript package
  build-js:
    needs: [create-releases, plan-release]
    if: |
      always() &&
      ((needs.create-releases.result == 'success' && needs.create-releases.outputs.releases_created == 'true') ||
       github.event_name == 'release' ||
       github.event_name == 'workflow_dispatch') &&
      needs.plan-release.outputs.js-needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      success: ${{ steps.build.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download version files
        uses: actions/download-artifact@v8
        with:
          name: version-files
          path: ./

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        id: build
        working-directory: vibetuner-js
        run: |
          bun install
          bun pm pack
          echo "Build completed successfully"

      - name: Upload JS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: js-dist
          path: vibetuner-js/*.tgz

  # Build Jinja package (mirrors vibetuner-py templates for npm consumers)
  build-jinja:
    needs: [create-releases, plan-release]
    if: |
      always() &&
      ((needs.create-releases.result == 'success' && needs.create-releases.outputs.releases_created == 'true') ||
       github.event_name == 'release' ||
       github.event_name == 'workflow_dispatch') &&
      needs.plan-release.outputs.jinja-needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      success: ${{ steps.build.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download version files
        uses: actions/download-artifact@v8
        with:
          name: version-files
          path: ./

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build tarball
        id: build
        working-directory: vibetuner-jinja
        run: |
          # `bun pm pack` runs the `prepare` lifecycle hook (scripts/sync.sh),
          # which mirrors vibetuner-py/src/vibetuner/templates/frontend/ into
          # templates/ before packing. The tarball ships those templates so
          # registry consumers don't need to run any post-install steps.
          bun pm pack
          echo "Build completed successfully"

      - name: Upload Jinja artifacts
        uses: actions/upload-artifact@v7
        with:
          name: jinja-dist
          path: vibetuner-jinja/*.tgz

  # Build documentation
  build-docs:
    needs: [create-releases, plan-release]
    if: |
      always() &&
      ((needs.create-releases.result == 'success' && needs.create-releases.outputs.releases_created == 'true') ||
       github.event_name == 'release' ||
       github.event_name == 'workflow_dispatch') &&
      needs.plan-release.outputs.docs-needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      success: ${{ steps.build.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download version files
        uses: actions/download-artifact@v8
        with:
          name: version-files
          path: ./

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build docs
        id: build
        working-directory: vibetuner-docs
        run: |
          uvx --with mkdocs-material mkdocs build --strict --site-dir site
          echo "Build completed successfully"

      - name: Add CNAME
        if: github.event_name == 'release'
        run: |
          echo "vibetuner.alltuner.com" > vibetuner-docs/site/CNAME

      - name: Upload docs artifacts
        uses: actions/upload-pages-artifact@v5
        with:
          path: vibetuner-docs/site

  # Publish Python package
  publish-python:
    needs: [build-python, plan-release]
    if: |
      always() &&
      needs.build-python.result == 'success' &&
      (github.event_name == 'release' || github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Publish to PyPI
        # `--check-url` makes uv consult the PyPI simple index for an existing
        # release of the same version+filename and skip the upload if it's
        # already there. Keeps force-rerun and split-failure-then-rerun
        # idempotent (see issue #1758).
        run: uv publish --check-url https://pypi.org/simple/

  # Publish JavaScript package
  publish-js:
    needs: [build-js, plan-release]
    if: |
      always() &&
      needs.build-js.result == 'success' &&
      (github.event_name == 'release' || github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download JS artifacts
        uses: actions/download-artifact@v8
        with:
          name: js-dist
          path: ./

      - name: Setup Node.js (for npm CLI)
        uses: actions/setup-node@v6
        with:
          node-version: "latest"

      - name: Publish to npm with trusted publishing
        env:
          NPM_CONFIG_PROVENANCE: true
        run: |
          TARBALL=$(ls alltuner-vibetuner-*.tgz | grep -v '^alltuner-vibetuner-jinja-')
          # Look up the version from the tarball-internal package.json so the
          # idempotent skip applies to the exact target we'd otherwise publish.
          VERSION=$(tar -xOf "$TARBALL" package/package.json | python3 -c 'import json,sys; print(json.load(sys.stdin)["version"])')
          if npm view "@alltuner/vibetuner@$VERSION" version >/dev/null 2>&1; then
            echo "@alltuner/vibetuner@$VERSION already on npm — skipping (issue #1758 guard)"
            exit 0
          fi
          echo "Publishing $TARBALL with trusted publishing"
          npm publish "./$TARBALL" --access public

  # Publish Jinja package
  publish-jinja:
    needs: [build-jinja, plan-release]
    if: |
      always() &&
      needs.build-jinja.result == 'success' &&
      (github.event_name == 'release' || github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download Jinja artifacts
        uses: actions/download-artifact@v8
        with:
          name: jinja-dist
          path: ./

      - name: Setup Node.js (for npm CLI)
        uses: actions/setup-node@v6
        with:
          node-version: "latest"

      - name: Publish to npm with trusted publishing
        env:
          NPM_CONFIG_PROVENANCE: true
        run: |
          TARBALL=$(ls alltuner-vibetuner-jinja-*.tgz)
          VERSION=$(tar -xOf "$TARBALL" package/package.json | python3 -c 'import json,sys; print(json.load(sys.stdin)["version"])')
          if npm view "@alltuner/vibetuner-jinja@$VERSION" version >/dev/null 2>&1; then
            echo "@alltuner/vibetuner-jinja@$VERSION already on npm — skipping (issue #1758 guard)"
            exit 0
          fi
          echo "Publishing $TARBALL with trusted publishing"
          npm publish "./$TARBALL" --access public

  # Deploy documentation
  deploy-docs:
    needs: [build-docs]
    if: |
      always() &&
      needs.build-docs.result == 'success' &&
      (github.event_name == 'release' || github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
