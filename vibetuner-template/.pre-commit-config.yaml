repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: end-of-file-fixer
      - id: no-commit-to-branch
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.19
    hooks:
      # Update the uv lockfile
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.16
    hooks:
      # Run the linter (check only, no auto-fix).
      - id: ruff-check
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.2.8
    hooks:
      - id: rumdl
        name: rumdl check
        pass_filenames: true
        require_serial: true
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        args: [--check]
  - repo: https://github.com/djlint/djLint
    rev: v1.39.0
    hooks:
      - id: djlint-jinja
        files: \.(html\.jinja)$
        # Mirror ignore list from djlint.toml: the djlint-jinja hook
        # passes --profile=jinja, which causes djlint to skip the
        # config file, so the ignore rules must be repeated here.
        args: ["--ignore=H006,J018"]
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          [
            --strict,
            feat,
            fix,
            docs,
            style,
            refactor,
            perf,
            test,
            build,
            ci,
            chore,
          ]
  - repo: local
    hooks:
      - id: lint-po
        name: lint-po
        entry: uv run --frozen lint-po
        language: system
        files: \.po$
