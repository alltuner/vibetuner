name: Build and Push Docker Images

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

concurrency:
  group: docker-build
  cancel-in-progress: true

env:
  COMPOSE_PROJECT_NAME: ${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: self-hosted
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run.conclusion == 'success'
      && contains(github.event.workflow_run.head_branch, 'main'))
    permissions:
      contents: read
    steps:
      - name: Get latest release tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)
          if [ -z "$TAG" ]; then
            echo "No release found, skipping"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Read project config
        id: config
        run: |
          echo "python_version=$(cat .python-version)" >> "$GITHUB_OUTPUT"
          registry=$(uv run --with pyyaml python -c "import yaml; print(yaml.safe_load(open('.copier-answers.yml')).get('docker_registry', 'localhost:5050'))")
          echo "docker_registry=$registry" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PYTHON_VERSION: ${{ steps.config.outputs.python_version }}
          DOCKER_REGISTRY: ${{ steps.config.outputs.docker_registry }}
          ENVIRONMENT: prod
        run: >-
          docker buildx bake -f compose.prod.yml --push
          --set "*.cache-from=type=registry,ref=$DOCKER_REGISTRY/$COMPOSE_PROJECT_NAME:buildcache"
          --set "*.cache-to=type=registry,ref=$DOCKER_REGISTRY/$COMPOSE_PROJECT_NAME:buildcache,mode=max"
