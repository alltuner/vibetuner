services:
  worker:
    image: ${DOCKER_REGISTRY:-localhost:5050}/${COMPOSE_PROJECT_NAME}:${VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env
    command: ["prod", "worker"]
    labels:
      com.centurylinklabs.watchtower.enable: "${ENABLE_WATCHTOWER:-false}"
  frontend:
    build:
      context: .
      args:
        PYTHON_VERSION: ${PYTHON_VERSION}
        ENVIRONMENT: ${ENVIRONMENT:-prod}
        VERSION: ${VERSION:-0.0.0}
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
        push: true
        tags:
          - ${DOCKER_REGISTRY:-localhost:5050}/${COMPOSE_PROJECT_NAME}:${VERSION:-0.0.0}
          - ${DOCKER_REGISTRY:-localhost:5050}/${COMPOSE_PROJECT_NAME}:latest
    image: ${DOCKER_REGISTRY:-localhost:5050}/${COMPOSE_PROJECT_NAME}:${VERSION:-latest}
    depends_on:
      - worker
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ping')",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    env_file:
      - .env
    labels:
      com.centurylinklabs.watchtower.enable: "${ENABLE_WATCHTOWER:-false}"
